lvgl:
  displays: my_display
  byte_order: little_endian

  pages:
    - id: main_page
      width: 100%
      bg_color: Black
      bg_opa: cover

      widgets:
        - obj:
            id: clock_obj
            x: 0
            y: 0
            width: 340
            height: 140
            bg_color: 0x000000
            border_color: 0x4B5563
            border_width: 3
            radius: 8

        - label:
            id: clock_label
            x: 0
            y: 0
            width: 340
            height: 140
            text: "--:--"
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: clock_font
            text_line_space: 0

        - obj:
            id: sensors_obj
            x: 0
            y: 140
            width: 340
            height: 457
            bg_color: 0x000000
            border_color: 0x4B5563
            border_width: 3
            radius: 8

        - label:
            id: temperature_label
            x: 0
            y: 140
            width: 170
            height: 90
            text: "--.-°"
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: sensors_font

        - label:
            id: humidity_label
            x: 170
            y: 140
            width: 170
            height: 90
            text: "--.-%"
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: sensors_font

        - label:
            id: co2_label
            x: 0
            y: 230
            width: 340
            height: 90
            text: "CO2 ---- ppm"
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: sensors_font

        - label:
            id: pm25_label
            x: 0
            y: 320
            width: 340
            height: 90
            text: "PM2.5 --- µg/m³"
            text_color: 0xFFFFFF
            text_align: CENTER
            text_font: sensors_font
